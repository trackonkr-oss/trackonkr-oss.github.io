<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACKON</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: black; color: white; font-family: 'Arial', sans-serif; overflow-x: hidden; }

/* 네비게이션 */
.nav-bar { position: fixed; top: 0; right: 0; padding: 30px 50px; z-index: 1001; }
.nav-links a { color: white; text-decoration: none; margin-left: 30px; font-weight: bold; letter-spacing: 2px; font-size: 14px; transition: 0.3s; }
.nav-links a:hover { color: #888; }

/* 로고 - 밝은색만 남기도록 수정 */
.logo { 
  position: fixed; 
  top: 20px; 
  left: 30px; 
  width: 160px; 
  z-index: 1000; 
  cursor: pointer; 
  transition: opacity 0.3s; 
  
  /* --- 핵심 수정 부분: 어두운 배경을 투명하게 처리 --- */
  mix-blend-mode: screen; 
}
.logo:hover { opacity: 0.7; }

/* 히어로 섹션 */
.hero { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; position: relative; }
.circle { width: 300px; height: 300px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; position: absolute; animation: spin 10s linear infinite; }
.circle::before { content: ""; position: absolute; top: -10px; left: 50%; width: 20px; height: 20px; background: white; border-radius: 50%; transform: translateX(-50%); }
@keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
.hero h1 { font-size: 60px; letter-spacing: 10px; }
.hero p { margin-top: 10px; color: #aaa; }

/* 공통 섹션 스타일 */
.section { min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; opacity: 0; transform: translateY(50px); transition: all 1s ease; text-align: center; }
.section.show { opacity: 1; transform: translateY(0); }
.section img { width: 60%; max-width: 800px; margin-bottom: 30px; }
.section h2 { font-size: 40px; margin-bottom: 10px; letter-spacing: 5px; }
.section p { color: #aaa; letter-spacing: 1px; }

footer { text-align: center; padding: 40px; color: #666; font-size: 12px; }
</style>
</head>
<body>

<nav class="nav-bar">
  <div class="nav-links">
    <a href="veil.html">VEIL</a>
    <a href="path.html">PATH</a>
    <a href="root.html">ROOT</a>
  </div>
</nav>

<a href="index.html">
  <img src="trackonlogonotmoving.png" class="logo">
</a>

<section class="hero">
  <div class="circle"></div>
  <h1>TRACKON</h1>
  <p>Stay On Target</p>
</section>

<section class="section">
  <img src="trackoninfo.png">
</section>

<section class="section">
  <img src="trackoninfogif.gif">
  <h2>LINEUP</h2>
  <p>Select your surface from the menu above</p>
</section>

<footer>© 2026 TRACKON</footer>

<script>
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) { section.classList.add('show'); }
  });
});
</script>
</body>
</html>
